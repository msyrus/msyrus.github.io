<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Minhaz Ahmed Syrus — Senior Software Engineer, syrus.xyz">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07070d"/>
      <stop offset="1" stop-color="#0d0d17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cf8d4"/>
      <stop offset="0.5" stop-color="#b48bff"/>
      <stop offset="1" stop-color="#ff7ab6"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.1" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#7cf8d4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7cf8d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.95" cy="0.9" r="0.55">
      <stop offset="0" stop-color="#b48bff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#b48bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="0.75" cy="0.2" r="0.35">
      <stop offset="0" stop-color="#ff7ab6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ff7ab6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#blob1)"/>
  <rect width="1200" height="630" fill="url(#blob2)"/>
  <rect width="1200" height="630" fill="url(#blob3)"/>

  <!-- Brand chip (top-left) -->
  <g transform="translate(72 76)">
    <rect x="0" y="0" rx="24" ry="24" width="224" height="48" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="22" cy="24" r="6" fill="#7cf8d4"/>
    <text x="42" y="31" fill="#9aa0b4" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="16" font-weight="500">syrus.xyz</text>
  </g>

  <!-- Name -->
  <text x="72" y="290" fill="url(#accent)" font-family="'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="108" font-weight="700" letter-spacing="-3">Minhaz Ahmed Syrus</text>

  <!-- Title -->
  <text x="72" y="370" fill="#e9ecf4" font-family="'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="500">Senior Software Engineer · Gopher · Dad</text>

  <!-- Subtitle -->
  <text x="72" y="430" fill="#9aa0b4" font-family="'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="400">Sainsbury's · Toptal · London, UK</text>

  <!-- Bottom-left chips -->
  <g transform="translate(72 520)" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="18" font-weight="500">
    <g>
      <rect x="0" y="0" rx="8" ry="8" width="70" height="36" fill="rgba(124,248,212,0.08)" stroke="rgba(124,248,212,0.25)"/>
      <text x="35" y="24" fill="#7cf8d4" text-anchor="middle">Go</text>
    </g>
    <g transform="translate(82 0)">
      <rect x="0" y="0" rx="8" ry="8" width="140" height="36" fill="rgba(180,139,255,0.08)" stroke="rgba(180,139,255,0.25)"/>
      <text x="70" y="24" fill="#b48bff" text-anchor="middle">TypeScript</text>
    </g>
    <g transform="translate(234 0)">
      <rect x="0" y="0" rx="8" ry="8" width="130" height="36" fill="rgba(255,122,182,0.08)" stroke="rgba(255,122,182,0.25)"/>
      <text x="65" y="24" fill="#ff7ab6" text-anchor="middle">Kubernetes</text>
    </g>
    <g transform="translate(376 0)">
      <rect x="0" y="0" rx="8" ry="8" width="90" height="36" fill="rgba(124,248,212,0.08)" stroke="rgba(124,248,212,0.25)"/>
      <text x="45" y="24" fill="#7cf8d4" text-anchor="middle">AWS</text>
    </g>
  </g>

  <!-- Right-side handle -->
  <text x="1128" y="576" text-anchor="end" fill="#6f748a" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="18" font-weight="500">github.com/msyrus</text>
</svg>
